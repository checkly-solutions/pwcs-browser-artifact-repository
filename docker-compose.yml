services:
  # Local artifact repository serving Playwright browser binaries
  artifact-repo:
    image: nginx:alpine
    container_name: playwright-artifact-repo
    ports:
      - "8888:80"
    volumes:
      - ./artifact-repo/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./artifact-repo/data:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Checkly Private Location agent
  checkly-agent:
    image: checkly/agent:latest
    container_name: checkly-private-agent
    depends_on:
      artifact-repo:
        condition: service_healthy
    environment:
      # Required: your Private Location API key from Checkly dashboard
      API_KEY: "${CHECKLY_PRIVATE_LOCATION_API_KEY:?Set CHECKLY_PRIVATE_LOCATION_API_KEY in .env}"
      # Point Playwright to our local artifact repository
      #PLAYWRIGHT_DOWNLOAD_HOST: "http://artifact-repo"
      # Optional tuning
      JOB_CONCURRENCY: 1
      LOG_LEVEL: "DEBUG"
    # Minimum resources for Playwright Check Suites
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
