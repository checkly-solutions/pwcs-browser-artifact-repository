log_format artifact '[artifact-repo] [$time_iso8601] | $status | $request_method $request_uri | '
                    '$body_bytes_sent bytes | From $remote_addr '
                    '"$http_user_agent"';

server {
    listen 80;
    server_name _;

    # Log browser downloads with clear prefix; suppress health check noise
    access_log /dev/stdout artifact;

    # Serve mirrored Playwright browser binaries
    location / {
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Health check — no logging to keep output clean
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
